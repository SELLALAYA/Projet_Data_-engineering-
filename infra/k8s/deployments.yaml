# ─────────────────────────────────────────
# STREAMLIT APP
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-intelligence-app
  namespace: default
  labels:
    app: price-intelligence-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: price-intelligence-app
  template:
    metadata:
      labels:
        app: price-intelligence-app
    spec:
      containers:
        - name: price-intelligence-app
          image: europe-west1-docker.pkg.dev/project-32a82952-90fa-4dd7-b9c/price-intelligence-registry/price-intelligence-app:latest
          ports:
            - containerPort: 8501
          env:
            - name: BIGTABLE_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: gcp-secrets
                  key: BIGTABLE_INSTANCE_ID
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: gcp-secrets
                  key: GCP_PROJECT_ID
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# ─────────────────────────────────────────
# NIFI
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: default
  labels:
    app: nifi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      containers:
        - name: nifi
          image: apache/nifi:latest
          ports:
            - containerPort: 8443
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
# ─────────────────────────────────────────
# SCRAPERS
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapers
  namespace: default
  labels:
    app: scrapers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scrapers
  template:
    metadata:
      labels:
        app: scrapers
    spec:
      containers:
        - name: scrapers
          image: europe-west1-docker.pkg.dev/project-32a82952-90fa-4dd7-b9c/price-intelligence-registry/scrapers:latest
          env:
            - name: BIGTABLE_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: gcp-secrets
                  key: BIGTABLE_INSTANCE_ID
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: gcp-secrets
                  key: GCP_PROJECT_ID
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
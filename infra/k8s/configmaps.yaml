# ─────────────────────────────────────────
# APP CONFIG
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
data:
  APP_ENV: "production"
  GCP_REGION: "europe-west1"
  BIGTABLE_INSTANCE_ID: "price-intelligence-bt"
  GKE_CLUSTER_NAME: "price-intelligence-gke"
  LOG_LEVEL: "INFO"

---
# ─────────────────────────────────────────
# NIFI CONFIG
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nifi-config
  namespace: default
data:
  NIFI_WEB_HTTPS_PORT: "8443"
  NIFI_CLUSTER_IS_NODE: "false"

---
# ─────────────────────────────────────────
# PROMETHEUS CONFIG
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'price-intelligence-app'
        static_configs:
          - targets: ['price-intelligence-app:8501']
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
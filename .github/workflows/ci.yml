name: Price Intelligence CI/CD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      - name: Install dependencies
        run: |
          pip install dbt-postgres great-expectations pandas psycopg2-binary sqlalchemy
      - name: Run dbt
        run: |
          cd dbt
          dbt debug --no-version-check
          dbt run --no-version-check
          dbt test --no-version-check
      - name: Run Great Expectations
        run: |
          python great_expectations_check.py
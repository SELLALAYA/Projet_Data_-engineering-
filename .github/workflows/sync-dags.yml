name: Sync DAGs to Cloud Composer

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'airflow/dags/**'
      - '.github/workflows/sync-dags.yml'

jobs:
  sync-dags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Get Composer DAGs bucket
        id: get-bucket
        run: |
          BUCKET=$(gcloud composer environments describe price-intelligence-composer \
            --location europe-west1 \
            --format='value(config.dagGcsPrefix)' | sed 's|gs://||' | cut -d'/' -f1)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Upload DAGs to Composer
        run: |
          gsutil -m cp -r airflow/dags/* gs://${{ steps.get-bucket.outputs.bucket }}/dags/

      - name: Verify DAGs uploaded
        run: |
          gsutil ls gs://${{ steps.get-bucket.outputs.bucket }}/dags/
name: Run Tests

on:
  push:
    branches: [ develop, main, feature/* ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          if [ -f app/requirements.txt ]; then
            pip install -r app/requirements.txt
          fi

      - name: Run tests
        run: |
          pytest tests/unit/ tests/integration/ -v --cov=app --cov-report=xml || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Install Great Expectations
        run: |
          pip install great_expectations

      - name: Run data quality checks
        run: |
          python tests/data_quality/expectations_prices.py || true
          python tests/data_quality/expectations_metadata.py || true
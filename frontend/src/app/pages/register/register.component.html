<div class="auth-wrapper">
  <div class="auth-container animate-fade-in">
    <div class="auth-card card-premium">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="bi bi-person-plus"></i>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join the Market Intelligence Network</p>
      </div>

      <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
        <div class="form-group-premium">
          <label class="input-label">Full Name</label>
          <div class="input-icon-wrap">
            <i class="bi bi-person"></i>
            <input type="text" name="name" class="input-premium" 
                   [(ngModel)]="name" placeholder="John Doe" required>
          </div>
        </div>

        <div class="form-group-premium mt-4">
          <label class="input-label">Corporate Email</label>
          <div class="input-icon-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" name="email" class="input-premium" 
                   [(ngModel)]="email" placeholder="name@company.com" required>
          </div>
        </div>

        <div class="form-group-premium mt-4">
          <label class="input-label">Security Credentials</label>
          <div class="input-icon-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" class="input-premium" 
                   [(ngModel)]="password" placeholder="••••••••" required>
          </div>
        </div>

        <div *ngIf="error" class="auth-error-msg mt-3">
          <i class="bi bi-exclamation-circle"></i> {{ error }}
        </div>

        <button type="submit" class="btn-premium btn-premium-primary w-100 mt-5 py-3" [disabled]="loading">
          <span *ngIf="!loading">Create Corporate Profile</span>
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <span *ngIf="loading">Processing...</span>
        </button>

        <div class="auth-footer mt-4">
          <p>Already have an account?</p>
          <a routerLink="/login" class="auth-link">Secure Sign In</a>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="auth-wrapper">
  <div class="auth-container animate-fade-in">
    <div class="auth-card card-premium">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="bi bi-graph-up-arrow"></i>
        </div>
        <h1 class="auth-title">Market Intelligence</h1>
        <p class="auth-subtitle">Professional Data Analytics & Tracking</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
        <div class="form-group-premium">
          <label class="input-label">Corporate Email / ID</label>
          <div class="input-icon-wrap">
            <i class="bi bi-envelope"></i>
            <input type="text" name="email" class="input-premium" 
                   [(ngModel)]="email" placeholder="admin or name@company.com" required>
          </div>
        </div>


        <div class="form-group-premium mt-4">
          <label class="input-label">Security Credentials</label>
          <div class="input-icon-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" class="input-premium" 
                   [(ngModel)]="password" placeholder="••••••••" required>
          </div>
        </div>

        <div *ngIf="error" class="auth-error-msg mt-3">
          <i class="bi bi-exclamation-circle"></i> {{ error }}
        </div>

        <button type="submit" class="btn-premium btn-premium-primary w-100 mt-5 py-3" [disabled]="loading">
          <span *ngIf="!loading">Establish Secure Session</span>
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <span *ngIf="loading">Authenticating...</span>
        </button>

        <div class="auth-footer mt-4">
          <p>Access restricted to authorized personnel.</p>
          <a routerLink="/register" class="auth-link">New user? Register account</a>
        </div>
      </form>
    </div>
    
    <div class="auth-info-text">
      <p><i class="bi bi-shield-check"></i> SSL Encrypted & BigQuery Integrated</p>
    </div>
  </div>
</div>

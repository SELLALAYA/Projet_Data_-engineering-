# ─────────────────────────────────────────────────────
# Docker Compose — Price Intelligence Platform
# Lance tous les services du projet en local
# ─────────────────────────────────────────────────────

# ─── VOLUMES ──────────────────────────────────────────
volumes:
  postgres_data:
  airflow_logs:
  nifi_data:
  bigtable_data:

# ─── NETWORKS ─────────────────────────────────────────
networks:
  price_network:
    driver: bridge

# ─── SERVICES ─────────────────────────────────────────
services:

  # ══════════════════════════════════════════════════
  # SERVICE 1 : PostgreSQL
  # ══════════════════════════════════════════════════
  postgres:
    image: postgres:15
    container_name: price_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - price_network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════════════
  # SERVICE 2 : Bigtable Emulator
  # ══════════════════════════════════════════════════
  bigtable-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: price_bigtable_emulator
    restart: unless-stopped
    command: gcloud beta emulators bigtable start --host-port=0.0.0.0:8086
    volumes:
      - bigtable_data:/data
      - ./data/bigtable-local:/bigtable-data
    ports:
      - "8086:8086"
    networks:
      - price_network

  # ══════════════════════════════════════════════════
  # SERVICE 3 : Airflow Init
  # ══════════════════════════════════════════════════
  airflow-init:
    image: apache/airflow:2.8.1
    container_name: price_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_UID: ${AIRFLOW_UID}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./airflow/logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com &&
        echo 'Airflow initialise avec succes !'
      "
    networks:
      - price_network

  # ══════════════════════════════════════════════════
  # SERVICE 4 : Airflow Webserver
  # ══════════════════════════════════════════════════
  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: price_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW_UID: ${AIRFLOW_UID}
      BIGTABLE_EMULATOR_HOST: ${BIGTABLE_EMULATOR_HOST}
      BIGTABLE_PROJECT_ID: ${BIGTABLE_PROJECT_ID}
      BIGTABLE_INSTANCE_ID: ${BIGTABLE_INSTANCE_ID}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./airflow/logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - price_network

  # ══════════════════════════════════════════════════
  # SERVICE 5 : Airflow Scheduler
  # ══════════════════════════════════════════════════
  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: price_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_UID: ${AIRFLOW_UID}
      BIGTABLE_EMULATOR_HOST: ${BIGTABLE_EMULATOR_HOST}
      BIGTABLE_PROJECT_ID: ${BIGTABLE_PROJECT_ID}
      BIGTABLE_INSTANCE_ID: ${BIGTABLE_INSTANCE_ID}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./airflow/logs:/opt/airflow/logs
    command: scheduler
    networks:
      - price_network

  # ══════════════════════════════════════════════════
  # SERVICE 6 : Apache NiFi
  # ══════════════════════════════════════════════════
  nifi:
    image: apache/nifi:1.24.0
    container_name: price_nifi
    restart: unless-stopped
    environment:
      NIFI_WEB_HTTPS_PORT: 8443
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD}
      BIGTABLE_EMULATOR_HOST: bigtable-emulator:8086
    volumes:
      - nifi_data:/opt/nifi/nifi-current/data
      - ./nifi/templates:/opt/nifi/nifi-current/conf/templates
      - ./nifi/conf:/opt/nifi/nifi-current/conf
      - ./nifi/logs:/opt/nifi/nifi-current/logs
    ports:
      - "8443:8443"
    networks:
      - price_network

